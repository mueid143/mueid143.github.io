<!DOCTYPE html>
<html>
<head>

<title>Link Promote BD</title>

<style>

body{
font-family:Arial;
background:linear-gradient(120deg,#4facfe,#00f2fe);
text-align:center;
}

.box{
background:white;
width:420px;
padding:25px;
margin:auto;
margin-top:80px;
border-radius:12px;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

.links{
margin-top:20px;
}

.card{
background:#f5f5f5;
padding:10px;
margin:8px;
border-radius:6px;
}

a{
color:#007bff;
}

.delete{
color:red;
cursor:pointer;
margin-left:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>🚀 Promote Your Link</h2>

<input id="linkInput" placeholder="Paste your link">

<button onclick="addLink()">Submit</button>

<div class="links" id="links"></div>

</div>

<script>

let links=JSON.parse(localStorage.getItem("links"))||[];

function showLinks(){

let container=document.getElementById("links");

container.innerHTML="";

links.forEach((link,index)=>{

container.innerHTML+=`

<div class="card">

<a href="${link}" target="_blank">${link}</a>

<span class="delete" onclick="deleteLink(${index})">❌</span>

</div>

`;

});

}

function addLink(){

let input=document.getElementById("linkInput");

let link=input.value;

if(link=="") return;

links.push(link);

localStorage.setItem("links",JSON.stringify(links));

input.value="";

showLinks();

}

function deleteLink(i){

links.splice(i,1);

localStorage.setItem("links",JSON.stringify(links));

showLinks();

}

showLinks();

</script>

</body>

</html>
