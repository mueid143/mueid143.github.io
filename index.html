<div id="linkList"></div>

<script>
function addLink(){
let link = document.getElementById("linkInput").value;
let list = document.getElementById("linkList");

let a = document.createElement("a");
a.href = link;
a.innerText = link;
a.target = "_blank";

let br = document.createElement("br");

list.appendChild(a);
list.appendChild(br);
}
</script>
