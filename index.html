<!DOCTYPE html>
<html>
<head>
<title>LinkShare BD</title>

<style>

body{
font-family: Arial;
background: linear-gradient(120deg,#4facfe,#00f2fe);
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:12px;
width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:70%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 15px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.link{
margin-top:10px;
padding:10px;
background:#f2f2f2;
border-radius:5px;
}

a{
text-decoration:none;
color:#007bff;
}

</style>

</head>

<body>

<div class="box">

<h2>🔗 LinkShare BD</h2>

<input id="linkInput" placeholder="Paste your link">
<button onclick="addLink()">Share</button>

<div id="links"></div>

</div>

<script>

let links = JSON.parse(localStorage.getItem("links")) || [];

function showLinks(){

let container = document.getElementById("links");

container.innerHTML="";

links.forEach((item,index)=>{

let div = document.createElement("div");

div.className="link";

div.innerHTML = `
<a href="${item.url}" target="_blank" onclick="countClick(${index})">${item.url}</a>
<br>
Clicks: ${item.clicks}
`;

container.appendChild(div);

});

}

function addLink(){

let input = document.getElementById("linkInput");

let url = input.value;

if(url===""){
alert("Enter link");
return;
}

links.push({url:url,clicks:0});

localStorage.setItem("links",JSON.stringify(links));

input.value="";

showLinks();

}

function countClick(index){

links[index].clicks++;

localStorage.setItem("links",JSON.stringify(links));

showLinks();

}

showLinks();

</script>

</body>
</html>
