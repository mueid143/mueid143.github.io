<!DOCTYPE html>
<html>
<head>
<title>LinkShare BD</title>
<style>
body{
font-family: Arial;
background: linear-gradient(120deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
text-align:center;
width:350px;
}

input{
width:70%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 15px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.link-list{
margin-top:20px;
}
</style>
</head>

<body>

<div class="box">

<h2>🔗 LinkShare BD</h2>

<input id="linkInput" placeholder="Paste your link">
<button onclick="addLink()">Share</button>

<div class="link-list" id="links"></div>

</div>

<script>

function addLink(){

let link = document.getElementById("linkInput").value;

if(link === ""){
alert("Enter a link");
return;
}

let div = document.createElement("div");

div.innerHTML = "<a href='"+link+"' target='_blank'>"+link+"</a>";

document.getElementById("links").appendChild(div);

document.getElementById("linkInput").value="";

}

</script>

</body>
</html>
