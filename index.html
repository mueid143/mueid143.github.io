<!DOCTYPE html>
<html>
<head>
<title>Link Promote BD</title>
<style>
body{
font-family:sans-serif;
text-align:center;
background:#f5f5f5;
}

.box{
background:white;
padding:20px;
width:300px;
margin:auto;
margin-top:100px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>Promote Your Link</h2>

<input id="linkInput" placeholder="Paste your link">
<button onclick="addLink()">Submit</button>

<div id="links"></div>

</div>

<script>
function addLink(){

let link=document.getElementById("linkInput").value;

let a=document.createElement("a");
a.href=link;
a.innerText=link;
a.target="_blank";

let br=document.createElement("br");

document.getElementById("links").appendChild(a);
document.getElementById("links").appendChild(br);

}
</script>

</body>
</html>
